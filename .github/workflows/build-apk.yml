name: بناء تطبيق متجري (APK)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تهيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تهيئة Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3

      - name: تثبيت الاعتماديات
        run: npm install

      - name: إضافة منصة أندرويد
        run: npx cap add android

      - name: تعديل صلاحيات أندرويد (جهات الاتصال + المزامنة)
        run: node scripts/patch-android.js

      - name: توليد أيقونة التطبيق وشاشة البداية
        continue-on-error: true
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#0E0E12' --iconBackgroundColorDark '#0E0E12' --splashBackgroundColor '#0E0E12' --splashBackgroundColorDark '#0E0E12'

      - name: مزامنة Capacitor
        run: npx cap sync android

      - name: منح صلاحية التنفيذ لـ gradlew
        run: chmod +x ./android/gradlew

      - name: بناء APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: matjari-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
